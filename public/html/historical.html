<div class="container">
    <h2>Historique</h2>
    
    <div class="card">
        <h3>Filtrer par date</h3>
        <div class="form-container" style="flex-direction:row;flex-wrap:wrap;align-items:flex-end;justify-content:flex-start;gap:10px;">
            <label for="date-from" style="margin:0;">Date de début :</label>
            <input type="date" id="date-from" style="width:auto;">
            <label for="date-to" style="margin:0;">Date de fin :</label>
            <input type="date" id="date-to" style="width:auto;">
            <button id="btn-filter-dates">Filtrer</button>
            <button id="btn-export-csv">Exporter CSV</button>
            <button id="btn-export-pdf">Exporter PDF</button>
        </div>
        <div id="historical-passages-list" class="historical-passages-list"></div>
        <div id="historical-message" class="message"></div>
    </div>

    <div class="card">
        <h3>Statistiques par dates</h3>
        <div id="stats-container"></div>
    </div>

</div>
