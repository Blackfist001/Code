<div class="container">
    <h2>Recherche étudiant</h2>
    <div class="card">
        <h3>Rechercher</h3>
        <div class="form-container">
            <input type="text" id="search-input" placeholder="Nom ou ID étudiant">
            <button id="btn-search">Rechercher</button>
        </div>
        <div id="search-message" class="message"></div>
    </div>

    <div class="card">
        <h2>Résultats de la recherche</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Classe</th>
                    <th>Passages</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="search-results-body">
                <!-- Results will be populated by JavaScript -->
            </tbody>
        </table>
    </div>
</div>
