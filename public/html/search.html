<div class="container">
    <h2>Recherche étudiant</h2>
    <div class="card">
        <h3>Rechercher</h3>
        <div class="form-container" style="flex-direction:row;flex-wrap:wrap;align-items:flex-end;justify-content:flex-start;gap:10px;">
            <select id="search-classe" style="width:auto;">
                <option value="">Toutes les classes</option>
            </select>
            <select id="search-name" style="width:auto;">
                <option value="">Tous les noms</option>
            </select>
            <select id="search-surname" style="width:auto;">
                <option value="">Tous les prénoms</option>
            </select>
            <select id="search-statut" style="width:auto;">
                <option value="">Tous les statuts</option>
                <option value="present">Présent</option>
                <option value="autorise">Autorisé</option>
                <option value="en_retard">En retard</option>
                <option value="absent">Absent</option>
                <option value="refuse">Refusé</option>
                <option value="absence_justifie">Absence justifiée</option>
                <option value="sortie_justifie">Sortie justifiée</option>
            </select>
            <button id="btn-search">Rechercher</button>
            <button id="btn-reset">Réinitialiser</button>
        </div>
        <div id="search-message" class="message"></div>
    </div>

    <div class="card">
        <h2>Résultats de la recherche</h2>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Classe</th>
                    <th>Type</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="search-results-body">
                <!-- Results will be populated by JavaScript -->
            </tbody>
        </table>
    </div>
</div>
