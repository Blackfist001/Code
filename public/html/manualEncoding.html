<div class="container">
    <h2>Encodage manuel</h2>
    <div class="card">
        <h3>Ajouter une entrée/sortie manuellement</h3>
        <div class="form-container" style="flex-direction:row;flex-wrap:wrap;align-items:flex-end;justify-content:flex-start;gap:10px;">
            <select id="encoding-classe" style="width:auto;">
                <option value="">-- Choisir une classe --</option>
            </select>
            <select id="encoding-name-student" disabled style="width:auto;">
                <option value="">-- Nom --</option>
            </select>
            <select id="encoding-surname-student" disabled style="width:auto;">
                <option value="">-- Prénom --</option>
            </select>
            <input type="hidden" id="encoding-id-student">
            <div id="encoding-student-info" style="display:none;padding:6px 0;color:#2c3e50;font-weight:bold;"></div>
            <select id="encoding-type" style="width:auto;">
                <option value="Entrée matin">Entrée matin</option>
                <option value="Sortie midi">Sortie midi</option>
                <option value="Rentrée midi">Rentrée midi</option>
                <option value="Entrée après-midi">Entrée après-midi</option>
                <option value="Sortie autorisée">Sortie autorisée</option>
                <option value="Journée">Journée</option>
            </select>
            <select id="encoding-reason" style="display:none;width:auto;">
                <option value="">-- Raison --</option>
                <option value="medical">Certificat médical</option>
                <option value="parental">Justificatif des parents</option>
                <option value="other">Autre</option>
            </select>
            <input type="date" id="encoding-date" style="width:auto;">
            <input type="time" id="encoding-time" style="width:auto;">
            <button id="btn-add-encoding" disabled>Ajouter</button>
        </div>
        <div id="encoding-message" class="message"></div>
    </div>

    <div class="card">
        <h3>Derniers passages manuels enregistrés</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Type</th>
                    <th>Raison</th>
                </tr>
            </thead>
            <tbody id="encoding-history-body">
            </tbody>
        </table>
    </div>
</div>
