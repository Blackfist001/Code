<div class="container">
    <h2>Tableau de bord</h2>
    <div class="card">
        <h3>Statistiques du jour</h3>
        <div id="dashboard-stats-container"></div>
        <div id="dashboard-message" class="message"></div>
    </div>

    <div class="card">
        <h3>Derniers passages</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Classe</th>
                    <th>Passage</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="movements-table-body">
                <!-- Rows will be populated by JavaScript -->
            </tbody>
        </table>
    </div>
</div>
