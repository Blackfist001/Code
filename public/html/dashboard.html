<div class="container">
    <h2>Tableau de bord</h2>
    <div class="card">
        <h3>Statistiques du jour</h3>
        <div class="stats-grid">
            <div class="stat-item">
                <span class="stat-label">Totaux étudiants :</span>
                <span id="total-students" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Présents :</span>
                <span id="present-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Absents :</span>
                <span id="absent-count" class="stat-value">0</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total passages :</span>
                <span id="total-scans" class="stat-value">0</span>
            </div>
        </div>
        <button id="btn-refresh-stats">Actualiser les statistiques</button>
        <div id="dashboard-message" class="message"></div>
    </div>

    <div class="card">
        <h3>Derniers passages</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Nom</th>
                    <th>Classe</th>
                    <th>Passage</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody id="movements-table-body">
                <!-- Rows will be populated by JavaScript -->
            </tbody>
        </table>
    </div>
</div>
