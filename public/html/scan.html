<div class="container">
    <h2>Scanner</h2>
    <div class="card">
        <h3>Scanner la carte étudiant</h3>
        <div class="form-container">
            <input type="text" id="scan-input" placeholder="Scanner la carte ou entrer l'ID étudiant" autofocus>
            <button id="btn-submit-scan">Soumettre</button>
        </div>
        <div id="scan-result" class="scan-result" style="display:none;">
            <p id="student-name">Nom : <span id="name-value">---</span></p>
            <p id="student-class">Classe : <span id="class-value">---</span></p>
            <p id="scan-type">Passage : <span id="type-value">---</span></p>
            <p id="scan-status" class="status-ok">STATUT: <span id="status-value">---</span></p>
        </div>
        <div id="message" class="message"></div>
    </div>

    <div class="card">
        <h3>Emploi du temps du jour</h3>
        <table>
            <thead>
                <tr>
                    <th>8H15</th>
                    <th>9H05</th>
                    <th>9H55</th>
                    <th>10H10</th>
                    <th>11H00</th>
                    <th>11H50</th>
                    <th>12H40</th>
                    <th>13H30</th>
                    <th>14H20</th>
                    <th>15H10</th>
                    <th>16H00</th>
                </tr>
            </thead>
            <tbody id="scan-schedule-body">
                <!-- Rows will être peuplées par JavaScript -->
            </tbody>
        </table>
    </div>
</div>
