<div class="container">
    <h2>Encodage manuel</h2>
    <div class="card">
        <h3>Ajouter une entrée/sortie manuellement</h3>
        <div class="form-container">
            <input type="text" id="encoding-id-student" placeholder="ID de l'étudiant" required>
            <input type="text" id="encoding-name-student" placeholder="Nom de l'étudiant">
            <input type="text" id="encoding-surname-student" placeholder="Prénom de l'étudiant">
            <select id="encoding-type">
                <option value="entree_matin">Entrée matin</option>
                <option value="sortie_midi">Sortie midi</option>
                <option value="entree_midi">Entrée midi</option>
                <option value="sortie_justifiee">Sortie justifiée</option>
                <option value="sortie">Sortie</option>
            </select>
            <select id="encoding-reason" style="display:none;">
                <option value="">-- Raison --</option>
                <option value="medical">Certificat médical</option>
                <option value="parental">Justificatif des parents</option>
                <option value="other">Autre</option>
            </select>
            <input type="date" id="encoding-date">
            <input type="time" id="encoding-time">
            <button id="btn-add-encoding">Ajouter</button>
        </div>
        <div id="encoding-message" class="message"></div>
    </div>

    <div class="card">
        <h3>Derniers passages manuels enregistrés</h3>
        <table>
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Heure</th>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Type</th>
                    <th>Raison</th>
                </tr>
            </thead>
            <tbody id="encoding-history-body">
                <!-- Rows will be populated by JavaScript -->
            </tbody>
        </table>
    </div>
</div>
